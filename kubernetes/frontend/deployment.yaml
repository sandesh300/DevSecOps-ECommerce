apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-frontend
  namespace: ecommerce
  labels:
    app: ecommerce-frontend
    component: frontend
    version: "v1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-frontend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: ecommerce-frontend
        component: frontend

    spec:
      serviceAccountName: ecommerce-sa
      automountServiceAccountToken: false

      # nginx official image runs as root by default to bind port 80.
      # Our Dockerfile.frontend switches to port 8080 and USER nginx (uid 101),
      # so we can enforce non-root here.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101        # nginx user UID in nginx:alpine image
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: ecommerce-frontend
          image: sandesh030/ecommerce-frontend:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080   # matches the sed-patched nginx.conf (listen 8080)
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # nginx writes pid/cache files
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

      restartPolicy: Always
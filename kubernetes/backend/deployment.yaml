apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-backend
  namespace: ecommerce
  labels:
    app: ecommerce-backend
    component: backend
    version: "v1.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-backend
  
  # Rolling update strategy 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Allow 1 extra pod during update
      maxUnavailable: 0    # Never reduce capacity during update

  template:
    metadata:
      labels:
        app: ecommerce-backend
        component: backend
      annotations:
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"

    spec:
      serviceAccountName: ecommerce-sa
      automountServiceAccountToken: false

      # ── Pod Security Context ──────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001        # appuser UID from Dockerfile
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # ── Init Container: Wait for MySQL ────────────────────────────────────────
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql-svc 3306; do
                echo "Waiting for MySQL..."; sleep 3;
              done
              echo "MySQL is ready."
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      containers:
        - name: ecommerce-backend
          # IMAGE_PLACEHOLDER — Jenkins will replace this via sed
          image: sandesh030/ecommerce-backend:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP

          # ── Container Security Context ────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # Spring Boot writes temp files
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          # ── Environment from ConfigMap ────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: backend-config

          # ── Sensitive env from Secret ─────────────────────────────────────────
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password

          # ── Resource Limits ───────────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"

          # ── Probes ────────────────────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

      # ── Topology Spread ───────────────────────────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: ecommerce-backend

      restartPolicy: Always
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-svc
  namespace: ecommerce
  labels:
    app: ecommerce-backend
    component: backend
spec:
  # NodePort so Minikube can expose it via minikube service command
  type: NodePort
  selector:
    app: ecommerce-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
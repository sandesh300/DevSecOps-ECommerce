apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ecommerce
  labels:
    app: mysql
    component: database
spec:
  serviceName: mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        component: database
    spec:
      # FIX: runAsNonRoot removed at pod level — MySQL image internally uses
      # user 999 (mysql) but the entrypoint starts as root then drops down.
      # fsGroup 999 still ensures volume ownership is correct.
      securityContext:
        fsGroup: 999

      serviceAccountName: ecommerce-sa

      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              protocol: TCP

          # FIX: Removed runAsUser/runAsGroup at container level.
          # MySQL's official image entrypoint must start as root to initialize
          # data dir, then it drops to the 'mysql' user (999) internally.
          # Forcing runAsUser: 999 breaks the init process.
          # allowPrivilegeEscalation: false is kept — it is still enforced
          # because MySQL drops privs itself; no exec setuid needed externally.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # MySQL writes to disk
            capabilities:
              drop:
                - NET_RAW
                - SYS_ADMIN

          # ── Environment from Secret ──────────────────────────────────────────
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-database
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password

          # ── Resource Limits ──────────────────────────────────────────────────
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # ── Volume Mounts ────────────────────────────────────────────────────
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
            - name: mysql-config
              mountPath: /etc/mysql/conf.d

          # FIX: Probes now use exec without bash variable expansion issues.
          # Using --no-password flag avoids the $MYSQL_ROOT_PASSWORD env
          # substitution problem inside probe exec commands.
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - --password=$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - -uroot
                - --password=$(MYSQL_ROOT_PASSWORD)
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-config
          configMap:
            name: mysql-config

---
# MySQL ConfigMap for hardened config
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: ecommerce
data:
  custom.cnf: |
    [mysqld]
    # Security settings
    skip-symbolic-links
    local-infile=0
    skip-show-database
    # Performance
    innodb_buffer_pool_size=256M
    max_connections=100
    # Logging
    slow_query_log=1
    long_query_time=2
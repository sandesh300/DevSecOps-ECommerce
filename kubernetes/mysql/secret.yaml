# ─────────────────────────────────────────────────────────────────────────────
# MySQL Secrets
# Generate values:  echo -n 'yourpassword' | base64
# To decode:        echo 'base64string' | base64 -d
#
# IMPORTANT: Replace ALL placeholder base64 values before applying.
#   echo -n 'ecommerce_db'    | base64  →  ZWNvbW1lcmNlX2Ri
#   echo -n 'ecommerce_user'  | base64  →  ZWNvbW1lcmNlX3VzZXI=
#   echo -n 'StrongPass@123'  | base64  →  U3Ryb25nUGFzc0AxMjM=
#   echo -n 'RootPass@456'    | base64  →  Um9vdFBhc3NANDU2
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: ecommerce
  labels:
    app: mysql
    component: database
type: Opaque
data:
  # Replace with your own base64-encoded values
  mysql-database: ZWNvbW1lcmNlX2Ri          # ecommerce_db
  mysql-user: ZWNvbW1lcmNlX3VzZXI=          # ecommerce_user
  mysql-password: U3Ryb25nUGFzc0AxMjM=      # StrongPass@123
  mysql-root-password: Um9vdFBhc3NANDU2      # RootPass@456